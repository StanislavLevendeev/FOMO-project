      reordered: false
      first_mismatch: null
active_architecture: mlp_2layer
model:
  input_dim: 384
  output_dim: 512
architectures:
  simple_linear:
    type: mlp
    hidden_dims: []
  mlp_2layer:
    type: mlp
    hidden_dims:
