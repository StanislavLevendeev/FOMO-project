# FOMO Adapter Configuration

dataset:
  repo_id: "StanislavLev/tiny-clip-image-encoders-adapter"
  cache_dir: "C:/hf_cache"
  image_embedding_folder: "dinov3_vitb16_pretrain_lvd1689m"
  text_embedding_folder: "tinyclip_vit_39m_16_text_19m_yfcc15m"

# Define the active architecture to use
active_architecture: "simple_linear"  # Options: "simple_linear", "mlp_2layer", "mlp_3layer", "residual_adapter", "deep_residual"

# Global model input/output dimension configurations
model:
  input_dim: 384          # dimension of DINOv3 image embeddings
  output_dim: 512         # target dimension size (CLIP text embeddings)

# Architectures list
architectures:
  simple_linear:
    type: "mlp"
    hidden_dims: []       # DinoEmbedding(384) -> linear(384 -> 512) (No activation, layernorm, or dropout is applied)

  mlp_2layer:
    type: "mlp"
    hidden_dims: [512]    # DinoEmbedding(384) -> linear(384 -> 512) -> Gelu -> linear(512 -> 512)
    activation: "GELU"
    use_layer_norm: true
    dropout: 0.1

  mlp_3layer:
    type: "mlp"
    hidden_dims: [1024, 1024] # DinoEmbedding(384) -> linear(384 -> 1024) -> Gelu -> linear(1024 -> 1024) -> Gelu -> linear(1024 -> 512)
    activation: "GELU"
    use_layer_norm: true
    dropout: 0.1

  residual_adapter:
    type: "residual"
    bottleneck_dim: 512   # set to 512 (equal to output_dim) to remove the bottleneck contraction
    activation: "ReLU"    # Relu activation for the secondary path

  deep_residual:
    type: "deep_residual"
    hidden_dim: 1024
    num_blocks: 4
    dropout: 0.3

training:
  device: "auto" # "cuda" or "cpu" or "auto", "cuda:0" for specific GPU
  batch_size: 8192 
  lr:  0.001 #0.0005      
  weight_decay: 0.05
  epochs: 50
  models_dir: "models"
  validation_fraction: 0.02
  split_seed: 42
  use_early_stopping: true
  early_stopping_patience: 10
  early_stopping_delta: 0.001
