dataset:
  repo_id: StanislavLev/tiny-clip-image-encoders-adapter
  cache_dir: /home/jovyan/fomo/cache
  name: laion1m
  image_embedding_folder: dinov3_vits16_pretrain_lvd1689m
  alignment:
    metadata_rows: 984340
    image:
      label: laion1m/dinov3_vits16_pretrain_lvd1689m/image
      rows: 984340
      reordered: false
      first_mismatch: null
    text:
      label: laion1m/tinyclip_vit_39m_16_text_19m_yfcc15m/text
